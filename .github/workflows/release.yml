name: Build iOS IPA (unsigned)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '8'

      # 🔥 TÄRKEIN FIX
      - name: Fix JAVA_HOME
        run: |
          echo "JAVA_HOME=$(/usr/libexec/java_home -v 1.8)" >> $GITHUB_ENV
          echo "$(/usr/libexec/java_home -v 1.8)/bin" >> $GITHUB_PATH

      - name: Verify Java
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          which java

      - name: Install dependencies
        run: |
          brew update
          brew install ldid make wget

      - name: Build IPA
        run: |
          set -e
          echo "=== START BUILD ==="

          make package || {
            echo "❌ Build failed, dumping debug info..."
            find . | head -n 200
            exit 1
          }

      - name: Debug output
        run: |
          find . -name "*.ipa" || true
          find . -name "*.tipa" || true

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: |
            **/*.ipa
            **/*.tipa
            **/*.app
            **/*.dSYM
          if-no-files-found: warn
