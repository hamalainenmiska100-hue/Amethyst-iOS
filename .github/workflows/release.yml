name: Release build (unsigned IPA)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-ios-unsigned:
    name: Build unsigned iOS IPA
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Install build dependencies
        run: |
          brew update
          brew install make ldid wget cmake
          echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
          echo "/usr/local/bin" >> "$GITHUB_PATH"

      - name: Verify toolchain
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path
          /usr/libexec/java_home -v 1.8
          gmake --version
          ldid -v || true
          cmake --version
          wget --version | head -n 1

      - name: Download JRE 8
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build.yml
          path: depends
          workflow_conclusion: success
          allow_forks: false
          repo: PojavLauncherTeam/android-openjdk-build-multiarch
          branch: buildjre8
          name: jre8-ios-aarch64

      - name: Download JRE 17
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build.yml
          path: depends
          workflow_conclusion: completed
          allow_forks: false
          repo: PojavLauncherTeam/android-openjdk-build-multiarch
          branch: buildjre17-21
          name: jre17-ios-aarch64

      - name: Download JRE 21
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build.yml
          path: depends
          workflow_conclusion: completed
          allow_forks: false
          repo: PojavLauncherTeam/android-openjdk-build-multiarch
          branch: buildjre17-21
          name: jre21-ios-aarch64

      - name: Build unsigned IPA and TrollStore TIPA
        env:
          RUNNER: 1
          SLIMMED: 1
          PLATFORM: 2
        run: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          gmake -j"$(sysctl -n hw.ncpu)" dsym package PLATFORM="$PLATFORM"
          gmake -j"$(sysctl -n hw.ncpu)" dsym package PLATFORM="$PLATFORM" TROLLSTORE_JIT_ENT=1

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: org.angelauramc.amethyst-ios-unsigned-ipa
          path: |
            artifacts/org.angelauramc.amethyst-*-ios.ipa
            artifacts/org.angelauramc.amethyst.slimmed-*-ios.ipa
          if-no-files-found: error

      - name: Upload TrollStore TIPA
        uses: actions/upload-artifact@v4
        with:
          name: org.angelauramc.amethyst-ios-trollstore-tipa
          path: |
            artifacts/org.angelauramc.amethyst-*-ios-trollstore.tipa
            artifacts/org.angelauramc.amethyst.slimmed-*-ios-trollstore.tipa
          if-no-files-found: error

      - name: Upload dSYM
        uses: actions/upload-artifact@v4
        with:
          name: AngelAuraAmethyst.dSYM
          path: artifacts/AngelAuraAmethyst.dSYM
          if-no-files-found: error
